# Используется на этапе деплоя (этап 10 плана), не на dev-этапе.
# Для prod переключите DATABASE_URL на Postgres (см. ниже).
version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://diary:diary@db:5432/diary
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diary
      POSTGRES_PASSWORD: diary
      POSTGRES_DB: diary
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diary"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
