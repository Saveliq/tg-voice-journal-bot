version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://diary:${POSTGRES_PASSWORD:-diary}@db:5432/diary
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      PROXY_URL: ${PROXY_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Кэш Whisper-модели — без этого модель скачивается при каждом пересборке
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diary}
      POSTGRES_DB: diary
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diary"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  whisper_cache:
